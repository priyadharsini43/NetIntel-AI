<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Intel AI | Intrusion Detection System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-shield-lock-fill text-primary me-2"></i>Net Intel <span class="text-primary">AI</span>
            </a>
            <div class="d-flex gap-2">
                <a href="/history" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-semibold">
                    <i class="bi bi-clock-history me-1"></i> History
                </a>
                <a href="/model" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-semibold">
                    <i class="bi bi-cpu me-1"></i> Model
                </a>
            </div>
        </div>
    </nav>
    <div class="main-container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 60px);">
        <div class="glass-panel text-center p-5 rounded-4 shadow-lg w-100" style="max-width: 600px;">
            <div class="logo-container mb-4">
                <i class="bi bi-shield-lock-fill text-primary display-3 pulse-animation"></i>
                <h1 class="mt-3 fw-bold tracking-tight">Net Intel <span class="text-primary">AI</span></h1>
                <p class="text-muted">Next-Generation Network Intrusion Detection</p>
            </div>
            
            <form id="uploadForm" class="upload-zone p-5 rounded-3 border border-2 border-dashed position-relative transition-all" enctype="multipart/form-data">
                <input type="file" id="fileInput" name="file" accept=".pcap" class="position-absolute top-0 start-0 w-100 h-100 opacity-0" style="cursor: pointer;">
                <div class="upload-content pointer-events-none">
                    <i class="bi bi-cloud-arrow-up display-4 text-secondary mb-3 d-block"></i>
                    <h5 class="fw-semibold">Drag & Drop your PCAP file here</h5>
                    <p class="text-muted small mb-0">or click to browse</p>
                    <p class="text-xs text-secondary mt-2">Maximum file size: 16MB</p>
                </div>
            </form>

            <div id="loadingIndicator" class="mt-4 d-none">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <h5 class="mt-3 fw-semibold text-light" id="loadingText">Uploading file...</h5>
                <p class="text-muted small">Please wait while the AI analyzes the network traffic.</p>
            </div>

            <div id="errorMessage" class="alert alert-danger mt-4 d-none" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> <span id="errorText">An error occurred.</span>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/script.js"></script>
</body>
</html>
